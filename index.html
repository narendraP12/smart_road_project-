<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart City Master Dashboard</title>
    <style>
        body { margin: 0; display: flex; font-family: 'Segoe UI', sans-serif; background: #0b0b0b; height: 100vh; color: white; overflow: hidden; }
        
        /* Sidebar Design */
        .sidebar { width: 260px; background: #151515; padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #333; box-sizing: border-box; }
        .logo { color: #00ff88; font-size: 22px; font-weight: bold; margin-bottom: 40px; text-align: center; padding-bottom: 15px; border-bottom: 1px solid #333; }
        
        /* Navigation Buttons */
        .nav-btn { background: transparent; color: #aaa; border: none; padding: 15px; text-align: left; font-size: 16px; cursor: pointer; border-radius: 10px; margin-bottom: 12px; transition: 0.3s; width: 100%; }
        .nav-btn:hover { background: #222; color: #00ff88; }
        .nav-btn.active { background: #00ff88; color: black; font-weight: bold; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        
        /* Main Display Area */
        .display-area { flex: 1; border: none; background: white; width: 100%; height: 100%; }
        .footer-tag { margin-top: auto; font-size: 12px; color: #555; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🌿 SMART ROAD AI</div>
        <nav>
            <button class="nav-btn active" onclick="changeView('piezo/index.html', this)">⚡ Energy Harvesting</button>
            <button class="nav-btn" onclick="changeView('road/index.html', this)">🛣️ Village Road Path</button>
        </nav>
        <div class="footer-tag">Project by: NITESH<br>ID: 3317755</div>
    </div>

    <iframe id="main-frame" class="display-area" src="piezo/index.html"></iframe>

    <script>
        function changeView(url, btn) {
            const frame = document.getElementById('main-frame');
            frame.src = url;
            
            // UI updates
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
